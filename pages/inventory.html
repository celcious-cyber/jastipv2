<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventori - Jastip Studio</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Path Lompataan CSS -->
    <link rel="stylesheet" href="../style.css">

    <style>
        .bg-sage-green { background-color: var(--sage-green) !important; color: white !important; }
        .text-sage-green { color: var(--sage-green) !important; }
    </style>
</head>
<body class="bg-rustic-cream pb-5 mb-5">
    
    <!-- Top Header Bawaan Berubah Route Tombol 'Baru' -->
    <header class="bg-white shadow-sm sticky-top">
        <div class="container d-flex justify-content-between align-items-center py-3">
            <div class="d-flex align-items-center">
                <!-- Tombol Kembali ke Dashboard -->
                <button onclick="window.location.href='../dashboard.html'" class="btn btn-sm bg-light rounded-circle border-0 shadow-sm me-3" style="width: 36px; height: 36px;">
                    <i class="bi bi-arrow-left fs-6 text-dark fw-bold"></i>
                </button>
                <div class="ms-1">
                    <h1 class="rustic-title m-0 fs-4">Gudang Stok</h1>
                    <span class="small text-muted fw-medium global-store-name" id="storeNameText">Jastip Studio</span>
                </div>
            </div>
            
            <!-- TOMBOL FITUR BARU : LOMPAT KE FORMULIR HTML -->
            <button class="btn btn-primary rounded-pill px-4 fw-medium shadow-sm transition-all" onclick="window.location.href='add-inventory.html'">
                <i class="bi bi-plus-lg me-1"></i> Baru
            </button>
        </div>
    </header>

    <!-- Main Content Gudang Grid -->
    <main class="container my-4">
        
        <!-- Search & Filter Live Debounce -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="input-group rustic-input-group shadow-sm bg-white" style="border-radius: 16px; border-bottom: none;">
                    <span class="input-group-text border-0 bg-transparent ps-4"><i class="bi bi-search text-muted"></i></span>
                    <input type="text" class="form-control rustic-input bg-transparent py-3" id="searchInput" placeholder="Cari pesanan dari nama barang atau Brand eksklusif..." style="font-weight: 500;">
                </div>
            </div>
        </div>

        <!-- Indikator Beban Database -->
        <div id="loadingState" class="text-center py-5">
            <div class="spinner-grow text-sage-green" style="width: 3rem; height: 3rem;" role="status">
                <span class="visually-hidden">Mendata Barang PWA...</span>
            </div>
        </div>

        <!-- Lahan Pembangunan Konten Kartu oleh JavaScript via Supabase Data -->
        <div class="row g-3" id="inventoryGrid">
        </div>

    </main>

    <!-- CATATAN: KODE MODAL TAHAP LAMA TELAH DIHANCURKAN DAN STRUKTUR DOM LEBIH RINGAN -->
    
    <!-- Script Libs via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Custom Core Scripts dengan Path root '../' -->
    <script src="../supabase-config.js"></script>
    <script src="../app.js"></script>
    <script src="../inventory.js"></script>
</body>
</html>
