<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Pembeli - Jastip PWA</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="bg-rustic-cream pb-5 mb-5">
    
    <!-- Top Header Cepat PWA -->
    <header class="bg-white shadow-sm sticky-top">
        <div class="container d-flex align-items-center py-3">
            <button onclick="window.location.href='customers.html'" class="btn btn-sm bg-light rounded-circle border-0 shadow-sm me-3" style="width: 36px; height: 36px;">
                <i class="bi bi-arrow-left fs-6 text-dark fw-bold"></i>
            </button>
            <h1 class="rustic-title m-0 fs-4">Kontak Baru</h1>
        </div>
    </header>

    <!-- Main Content Form Registrasi Pelanggan Berskala Penuh -->
    <main class="container my-4">
        <div class="card rustic-card border-0 shadow-sm p-3 p-md-4" style="border-radius: 20px;">
            <div class="card-body">
                <form id="addCustomerForm">
                    <!-- Sektor 1: Kartu Tanda Pengenal -->
                    <h5 class="fw-bold text-terracotta mb-4" style="font-family: 'Jost', sans-serif;"><i class="bi bi-person-badge-fill me-2 fs-4 align-text-bottom"></i>Data Pribadi</h5>
                    
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-muted">Nama Pembeli Lengkap / Alias</label>
                        <input type="text" id="custName" class="form-control rustic-input bg-light border-0 py-3 rounded-4 px-4 fs-6 text-dark fw-medium shadow-sm" placeholder="Misal: Bapak Rully Hidayat" required>
                    </div>
                    
                    <!-- Sektor 2: Jaringan Kontak -->
                    <div class="mb-4 mt-2">
                        <label class="form-label small fw-bold text-muted">Nomor WhatsApp / HP Aktif</label>
                        <div class="input-group shadow-sm" style="border-radius: 16px;">
                            <span class="input-group-text border-0 text-white ps-4 border-end-0 fw-bold" style="background-color: var(--sage-green); border-top-left-radius: 16px; border-bottom-left-radius: 16px;">
                                <i class="bi bi-telephone-fill"></i>
                            </span>
                            <input type="tel" id="custPhone" class="form-control bg-light border-0 py-3 text-dark fw-medium" style="border-top-right-radius: 16px; border-bottom-right-radius: 16px; border: 2px solid var(--sage-green);" placeholder="Contoh: 0812345678" required>
                        </div>
                        <div class="form-text mt-2 small text-muted"><i class="bi bi-info-circle-fill me-1"></i>Sistem kami otomatis membaca dan me-*link* format awalan 0, 8, maupun 62.</div>
                    </div>

                    <hr class="text-terracotta opacity-25 my-4">

                    <!-- Sektor 3: Logistik -->
                    <h5 class="fw-bold text-terracotta mb-4 mt-2" style="font-family: 'Jost', sans-serif;"><i class="bi bi-truck me-2 fs-4 align-text-bottom"></i>Rute Pengiriman</h5>
                    
                    <div class="mb-5">
                        <label class="form-label small fw-bold text-muted">Akurasi Titik Alamat Lengkap (+ Kode Pos)</label>
                        <textarea id="custAddress" class="form-control rustic-input bg-light border-0 py-3 rounded-4 px-4 shadow-sm fw-medium text-dark" rows="4" placeholder="Cth: Komplek Bumi Sentosa Blok C2 No 15, RT/RW 02/09, Cibinong, Bogor 16911" required></textarea>
                    </div>

                    <!-- Alert Validasi Cerdas (Peringatan Koneksi/Reject) -->
                    <div id="formError" class="rustic-error d-none mb-4 shadow-sm" style="background-color: #fbeee8;">
                        <i class="bi bi-exclamation-triangle-fill me-2 fs-5"></i> <span class="fw-bold"></span>
                    </div>

                    <button type="submit" class="btn text-white w-100 rounded-pill py-3 fw-bold fs-5 shadow-sm transition-all" style="background-color: var(--terracotta); border:none;" id="btnSubmit">
                        <i class="bi bi-journal-plus me-2"></i> Daftarkan Buku Kontak
                    </button>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- Path File JS Eksternal (API Murni) -->
    <script src="../supabase-config.js"></script>
    <script src="../add-customer.js"></script>
</body>
</html>
