<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Tim - Jastip Studio</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="bg-rustic-cream pb-5">
    
    <header class="bg-white shadow-sm sticky-top">
        <div class="container d-flex justify-content-between align-items-center py-3">
            <div class="d-flex align-items-center">
                <a href="../dashboard.html" class="btn btn-sm bg-light rounded-circle border-0 shadow-sm me-3" style="width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;">
                    <i class="bi bi-arrow-left fs-6 text-dark fw-bold"></i>
                </a>
                <div class="ms-1">
                    <h1 class="rustic-title m-0 fs-4">Manajemen Tim</h1>
                    <span class="small text-muted fw-medium global-store-name" id="storeNameText">Jastip Studio</span>
                </div>
            </div>
            <a href="add-staff.html" class="btn btn-dark btn-sm rounded-pill px-3 shadow-sm">
                <i class="bi bi-person-plus-fill me-1"></i> Baru
            </a>
        </div>
    </header>

    <main class="container my-4">
        
        <!-- Papan Info Tim -->
        <div class="card border-0 shadow-sm p-4 rounded-4 bg-white mb-4 overflow-hidden" style="border-left: 6px solid var(--sage-green) !important;">
            <div class="d-flex align-items-center">
                <div class="bg-sage-green text-white rounded-circle d-flex align-items-center justify-content-center shadow-sm me-3" style="width: 50px; height: 50px;">
                    <i class="bi bi-people-fill fs-4"></i>
                </div>
                <div>
                    <h5 class="fw-bold m-0 text-dark">Daftar Anggota Toko</h5>
                    <p class="small text-muted m-0">Kelola akses staff dan kolaborator Anda.</p>
                </div>
            </div>
        </div>

        <!-- Indikator Loading Data -->
        <div id="loadingState" class="text-center py-5 d-none">
            <div class="spinner-grow text-sage-green" role="status"></div>
            <p class="mt-2 text-muted fw-medium">Menghubungi Anggota...</p>
        </div>

        <!-- Daftar Karyawan List -->
        <div id="staffList" class="row g-3">
            <!-- Diisi oleh staff.js -->
        </div>

    </main>

    <!-- Bottom Navbar -->
    <nav class="navbar fixed-bottom bg-white border-top py-2 px-3 shadow-lg">
        <div class="container d-flex justify-content-around">
            <a href="../dashboard.html" class="text-center text-decoration-none text-muted opacity-50">
                <i class="bi bi-house-door d-block fs-4"></i>
                <span class="x-small">Beranda</span>
            </a>
            <a href="staff.html" class="text-center text-decoration-none text-dark active-nav">
                <i class="bi bi-people-fill d-block fs-4"></i>
                <span class="x-small">Tim</span>
            </a>
            <a href="settings.html" class="text-center text-decoration-none text-muted opacity-50">
                <i class="bi bi-gear d-block fs-4"></i>
                <span class="x-small">Pengaturan</span>
            </a>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <script src="../app.js"></script>
    <script src="../staff.js"></script>
</body>
</html>
