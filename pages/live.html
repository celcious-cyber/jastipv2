<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Event - Jastip Studio</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../style.css">

    <style>
        .event-card {
            border-radius: 24px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }
        .event-card:hover {
            border-color: var(--sage-green);
            transform: translateY(-5px);
        }
        .status-badge {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .bg-active { background-color: #d1e7dd; color: #0f5132; }
        .bg-closed { background-color: #f8d7da; color: #842029; }
    </style>
</head>
<body class="bg-rustic-cream pb-5 mb-5">
    
    <!-- Header -->
    <header class="bg-white shadow-sm sticky-top">
        <div class="container d-flex justify-content-between align-items-center py-3">
            <div class="d-flex align-items-center">
                <button onclick="window.location.href='../dashboard.html'" class="btn btn-sm bg-light rounded-circle border-0 shadow-sm me-3" style="width: 36px; height: 36px;">
                    <i class="bi bi-arrow-left fs-6 text-dark fw-bold"></i>
                </button>
                <h1 class="rustic-title m-0 fs-4">Live Event 🎙️</h1>
            </div>
            
            <button class="btn btn-primary rounded-pill px-4 fw-medium shadow-sm" data-bs-toggle="modal" data-bs-target="#addEventModal">
                <i class="bi bi-plus-lg me-1"></i> Mulai Live
            </button>
        </div>
    </header>

    <main class="container my-4">
        <!-- Search -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="input-group rustic-input-group shadow-sm bg-white" style="border-radius: 16px; border-bottom: none;">
                    <span class="input-group-text border-0 bg-transparent ps-4"><i class="bi bi-broadcast text-danger"></i></span>
                    <input type="text" class="form-control rustic-input bg-transparent py-3" id="eventSearch" placeholder="Cari rekaman Live sebelumnya...">
                </div>
            </div>
        </div>

        <!-- Loading -->
        <div id="loadingState" class="text-center py-5">
            <div class="spinner-grow text-danger" style="width: 3rem; height: 3rem;" role="status">
                <span class="visually-hidden">Memuat Sesi Live...</span>
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-5 d-none">
            <i class="bi bi-camera-reels text-muted" style="font-size: 4rem;"></i>
            <h5 class="mt-3 fw-bold text-muted">Belum ada Sesi Live</h5>
            <p class="text-muted">Mulai sesi live pertama Anda untuk mencatat grab pelanggan!</p>
        </div>

        <!-- Event Grid -->
        <div class="row g-3" id="eventGrid">
            <!-- Render via JS -->
        </div>
    </main>

    <!-- Modal Tambah Event -->
    <div class="modal fade" id="addEventModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rustic-modal border-0 shadow-lg">
                <div class="modal-header border-0 pt-4 px-4">
                    <h5 class="modal-title fw-bold rustic-title">Mulai Sesi Live Baru</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="addEventForm">
                    <div class="modal-body p-4">
                        <div class="mb-3">
                            <label class="form-label small fw-bold text-muted">Judul / Nama Sesi Live</label>
                            <input type="text" class="form-control rustic-input bg-light border-0 py-3 rounded-4" id="eventTitle" placeholder="Contoh: PO Bangkok 28 Maret" required>
                        </div>
                        <p class="small text-muted mb-0">
                            <i class="bi bi-info-circle me-1"></i> Sesi live yang dimulai akan langsung berstatus <strong>Active</strong> dan siap mencatat Grab.
                        </p>
                    </div>
                    <div class="modal-footer border-0 pb-4 px-4">
                        <button type="submit" class="btn btn-primary rounded-pill w-100 py-3 fw-bold" id="btnStartLive">Mulai Sekarang!</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Script Libs -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <script src="../live.js"></script>
</body>
</html>
