<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruang Live Session - Jastip Studio</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../style.css">

    <style>
        .live-room-container {
            max-width: 600px;
            margin: auto;
            background-color: var(--cream);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header-live { border-bottom: 2px solid var(--sand); }
        .item-scroll-area { 
            flex: 1; 
            overflow-y: auto; 
            padding: 1rem;
        }
        .grab-log-area { 
            height: 250px; 
            background: white; 
            border-top: 5px solid var(--sage-green);
            overflow-y: auto;
            padding: 1rem;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.05);
        }
        .item-btn {
            background: white;
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 15px;
            text-align: left;
            margin-bottom: 12px;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            width: 100%;
        }
        .item-btn:active { transform: scale(0.96); }
        .item-btn.selected { border-color: var(--terracotta); background-color: #fff9f6; }
        
        .customer-selector {
            background: var(--sand);
            border-radius: 20px;
            padding: 10px 20px;
            margin-bottom: 10px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .grab-item {
            border-left: 3px solid var(--sage-green);
            padding: 8px 15px;
            margin-bottom: 10px;
            border-radius: 0 10px 10px 0;
            background: #f8fbfa;
            font-size: 0.9rem;
        }
        .btn-finalize {
            background: var(--terracotta);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
        }
        /* Dashboard Indicators */
        .live-indicator {
            width: 10px;
            height: 10px;
            background-color: red;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            animation: pulse-red 1s infinite;
        }
        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(255, 0, 0, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }
    </style>
</head>
<body class="bg-light">

    <div class="live-room-container shadow-sm border-start border-end">
        
        <!-- Header Sesi -->
        <header class="header-live p-3 bg-white d-flex justify-content-between align-items-center">
            <div>
                <button onclick="window.history.back()" class="btn btn-sm bg-light rounded-circle border-0 me-2"><i class="bi bi-x-lg"></i></button>
                <span class="live-indicator"></span>
                <span class="fw-bold rustic-title" id="sessionTitle">Live Session...</span>
            </div>
            <button class="btn btn-finalize btn-sm" id="btnFinalize">Selesai Berakhir</button>
        </header>

        <!-- Pilihan Customer -->
        <div class="px-3 pt-3">
            <div class="customer-selector shadow-sm">
                <label class="small text-muted fw-bold d-block mb-1">Siapa yang Grab? (Typing...)</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-0"><i class="bi bi-person-heart text-terracotta"></i></span>
                    <input type="text" class="form-control bg-transparent border-0 fw-bold" id="customerSearch" placeholder="Ketik Nama Customer..." list="customerList">
                    <datalist id="customerList">
                        <!-- Render via JS -->
                    </datalist>
                </div>
            </div>
        </div>

        <!-- Area Produk -->
        <div class="item-scroll-area">
            <h6 class="text-muted small fw-bold mb-3 px-1">KLIK BARANG UNTUK GRAB! 🛍️</h6>
            <div id="itemList">
                <!-- Data Stok Inventori -->
                <div class="text-center py-5 loading-spinner">
                    <div class="spinner-border text-sage-green" role="status"></div>
                </div>
            </div>
        </div>

        <!-- Log Grab Berakhir -->
        <div class="grab-log-area">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="m-0 fw-bold text-sage-green">LOG GRAB REALTIME</h6>
                <span class="badge bg-sage-green rounded-pill" id="grabCount">0 Grab</span>
            </div>
            <div id="grabLogs">
                <p class="text-muted text-center py-4 small">Belum ada aktivitas grab.<br>Pastikan Anda memilih customer dulu!</p>
            </div>
        </div>

    </div>

    <!-- Modal Konfirmasi Menutup Sesi & Konversi ke Invoice -->
    <div class="modal fade" id="finalizeModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content rustic-modal border-0 shadow-lg">
                <div class="modal-body text-center p-5">
                    <div class="mb-4">
                        <i class="bi bi-file-earmark-check-fill text-success" style="font-size: 4rem;"></i>
                    </div>
                    <h3 class="rustic-title mb-3 fs-3">Tutup Sesi Live?</h3>
                    <p class="text-muted mb-4">Semua "Grab" yang tercatat akan otomatis diringkas menjadi <strong>Pesanan Baru (Invoice)</strong> di Papan Kanban Anda. Stok inventori juga akan terpotong seketika.</p>
                    <div class="d-grid gap-2">
                        <button class="btn btn-primary rounded-pill py-3 fw-bold shadow" id="confirmFinalize">Ya, Konversi ke Invoice!</button>
                        <button class="btn btn-light rounded-pill py-3 fw-medium" data-bs-dismiss="modal">Masih Mau Live</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Script Libs -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <script src="../live-session.js"></script>
</body>
</html>
