<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen Pesanan - Jastip Studio</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="../style.css">

    <style>
        .nav-pills .nav-link { color: #888; font-weight: 500; border-radius: 50px; padding: 10px 24px; transition: all 0.3s ease; }
        .nav-pills .nav-link.active { background-color: var(--terracotta); color: white; box-shadow: 0 4px 15px rgba(198, 113, 86, 0.3); }
        .status-unpaid { border-left: 4px solid #f39c12 !important; }
        .status-packing { border-left: 4px solid var(--sage-green) !important; }
        .status-completed { border-left: 4px solid #2ecc71 !important; opacity: 0.8; }
        .item-list-bg { background-color: #fafbfc; border-radius: 12px; }
    </style>
</head>
<body class="bg-rustic-cream pb-5 mb-5">
    
    <!-- Top Header PWA Mengambang -->
    <header class="bg-white shadow-sm sticky-top">
        <div class="container py-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="d-flex align-items-center">
                    <button onclick="window.location.href='../dashboard.html'" class="btn btn-sm bg-light rounded-circle border-0 shadow-sm me-3" style="width: 36px; height: 36px;">
                        <i class="bi bi-arrow-left fs-6 text-dark fw-bold"></i>
                    </button>
                    <div class="ms-1">
                        <h1 class="rustic-title m-0 fs-4">Lalu Lintas Pesanan</h1>
                        <span class="small text-muted fw-medium global-store-name" id="storeNameText">Jastip Studio</span>
                    </div>
                </div>
                <!-- Tombol Transaksi Baru Ceria -->
                <button class="btn btn-primary rounded-pill px-4 fw-medium shadow-sm" onclick="window.location.href='add-order.html'">
                    <i class="bi bi-receipt me-1"></i> Baru
                </button>
            </div>

            <!-- Sistem Kanban Navigasi Pill -->
            <ul class="nav nav-pills nav-fill gap-2 p-1 bg-light rounded-pill border" id="pills-tab" role="tablist">
                <li class="nav-item" role="presentation">
                    <button class="nav-link active rounded-pill w-100" id="pill-unpaid-tab" data-bs-toggle="pill" data-bs-target="#pill-unpaid" type="button" role="tab">Menunggu</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link rounded-pill w-100" id="pill-packing-tab" data-bs-toggle="pill" data-bs-target="#pill-packing" type="button" role="tab">Dikemas</button>
                </li>
                <li class="nav-item" role="presentation">
                    <button class="nav-link rounded-pill w-100" id="pill-completed-tab" data-bs-toggle="pill" data-bs-target="#pill-completed" type="button" role="tab">Selesai</button>
                </li>
            </ul>
        </div>
    </header>

    <!-- Papan Kanban Utama -->
    <main class="container my-4">

        <div id="loadingState" class="text-center py-5 d-none">
            <div class="spinner-grow text-terracotta" style="width: 3rem; height: 3rem;" role="status">
                <span class="visually-hidden">Membongkar Nota...</span>
            </div>
        </div>

        <div class="tab-content" id="pills-tabContent">
            
            <!-- BOARD 1: UNPAID (Belum Lunas / Dalam Konfirmasi Tagihan) -->
            <div class="tab-pane fade show active" id="pill-unpaid" role="tabpanel" tabindex="0">
                <div class="row g-3" id="board-unpaid">
                    <!-- Cards will be injected here -->
                </div>
            </div>

            <!-- BOARD 2: PACKING (Proses Belanja/Kemas) -->
            <div class="tab-pane fade" id="pill-packing" role="tabpanel" tabindex="0">
                <div class="row g-3" id="board-packing">
                </div>
            </div>

            <!-- BOARD 3: COMPLETED (Selesai/Arsip) -->
            <div class="tab-pane fade" id="pill-completed" role="tabpanel" tabindex="0">
                <div class="row g-3" id="board-completed">
                </div>
            </div>

        </div>

    </main>

    <!-- Modal Rincian Pesanan (Pop-up Detail) -->
    <div class="modal fade" id="orderDetailModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-header border-0 pb-0 justify-content-center position-relative">
                    <h5 class="modal-title fw-bold text-dark" style="font-family: 'Jost', sans-serif;">Pilar Rincian Tagihan</h5>
                    <button type="button" class="btn-close position-absolute end-0 me-3" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body pt-3 pb-4 px-4" id="orderDetailContent">
                    <!-- Javascript Orders.js akan membedah JSONB di sini -->
                </div>
            </div>
        </div>
    </div>

    <!-- Notifikasi Sistem (Toast Bootstrap untuk Salin Tagihan) -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1080;">
        <div id="copyToast" class="toast align-items-center text-bg-success border-0 rounded-4 shadow-lg" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex px-2 py-1">
                <div class="toast-body fw-medium fs-6">
                    <i class="bi bi-clipboard-check-fill me-2 fs-5 align-middle"></i> Teks tagihan WhatsApp berhasil disalin!
                </div>
            </div>
        </div>
    </div>

    <!-- Script Libs via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="../supabase-config.js"></script>
    <script src="../app.js"></script>
    <script src="../orders.js"></script>
</body>
</html>
