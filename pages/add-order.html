<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaksi Pesanan Baru - Jastip</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        .item-row { border-left: 3px solid var(--terracotta); padding-left: 12px; margin-bottom: 20px; transition: all 0.2s ease;}
        .item-row:hover { border-left: 3px solid var(--sage-green); }
        .form-select:focus, .form-control:focus { box-shadow: none; border-color: inherit; outline: none; }
    </style>
</head>
<body class="bg-rustic-cream pb-5 mb-5">
    
    <header class="bg-white shadow-sm sticky-top">
        <div class="container d-flex justify-content-between align-items-center py-3">
            <div class="d-flex align-items-center">
                <button onclick="window.history.back()" class="btn btn-sm bg-light rounded-circle border-0 shadow-sm me-3" style="width: 36px; height: 36px;">
                    <i class="bi bi-arrow-left fs-6 text-dark fw-bold"></i>
                </button>
                <h1 class="rustic-title m-0 fs-4">Buat Tagihan Baru</h1>
            </div>
        </div>
    </header>

    <main class="container my-4">
        <div class="card rustic-card border-0 shadow-sm p-3 p-md-4" style="border-radius: 20px;">
            <div class="card-body">
                <form id="addOrderForm">
                    
                    <!-- SEKTOR 1: PELANGGAN -->
                    <h5 class="fw-bold text-dark mb-3" style="font-family: 'Jost', sans-serif;"><i class="bi bi-person-bounding-box me-2 text-sage-green"></i>Nama Pelanggan</h5>
                    <div class="mb-4 pb-2 border-bottom">
                        <label class="form-label small fw-bold text-muted">Arahkan Tagihan Kepada Pelanggan Ini</label>
                        <select id="selectCustomer" class="form-select rustic-input bg-light border-0 py-3 rounded-4 px-3 fw-medium shadow-sm" required>
                            <option value="">Sedang Memuat Baze Data Kontak...</option>
                        </select>
                        <div class="form-text small mt-2">Nama tidak ada? Daftarkan dulu di Modul Pelanggan.</div>
                    </div>

                    <!-- SEKTOR 2: RINCIAN BARANG -->
                    <h5 class="fw-bold text-dark mb-3 mt-4" style="font-family: 'Jost', sans-serif;">
                        <i class="bi bi-cart4 me-2 text-terracotta"></i>Rincian Barang
                    </h5>
                    <!-- Wadah Dinamis Array Barang dari Inventori -->
                    <div id="dynamicItemsContainer" class="p-3 bg-white border border-light rounded-4 shadow-sm mb-3">
                        <!-- Komponen Baris Dropdown 1 akan disuntik di sini oleh JS-->
                    </div>
                    
                    <!-- Tombol Tambah yang Dipepadatkan (Kini Ada di Bawah List agar tak merusak Judul) -->
                    <div class="mb-4 pb-2 border-bottom text-end">
                        <button type="button" class="btn btn-sm text-white rounded-pill px-4 py-2 shadow-sm fw-bold" style="background-color: var(--sage-green);" id="btnAddItemRow">
                            <i class="bi bi-plus-lg fs-6 me-1"></i> Tambah Item Belanjaan
                        </button>
                    </div>

                    <!-- SEKTOR 3: REKAP FINANSIAL -->
                    <h5 class="fw-bold text-dark mb-3 mt-4" style="font-family: 'Jost', sans-serif;"><i class="bi bi-calculator me-2 text-warning"></i>Kalkulasi Akhir Tagihan</h5>
                    
                    <!-- Ongkos Biaya Titip -->
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-muted">Suntikan Fee Jastip / Packing</label>
                        <div class="input-group shadow-sm" style="border-radius: 16px;">
                            <span class="input-group-text border-0 bg-light text-muted ps-4 border-end-0">Rp</span>
                            <input type="number" id="inputFeeJastip" class="form-control bg-light border-0 py-3 fw-bold fs-6 text-dark" style="border-top-right-radius: 16px; border-bottom-right-radius: 16px;" value="2000" min="0" required>
                        </div>
                    </div>

                    <!-- Ongkos Kirim Permintaan User -->
                    <div class="mb-4 pb-2">
                        <label class="form-label small fw-bold text-muted">Biaya Ekspedisi / Ongkos Kirim</label>
                        <div class="input-group shadow-sm" style="border-radius: 16px;">
                            <span class="input-group-text border-0 bg-light text-muted ps-4 border-end-0">Rp</span>
                            <input type="number" id="inputShippingCost" class="form-control bg-light border-0 py-3 fw-bold fs-6 text-dark" style="border-top-right-radius: 16px; border-bottom-right-radius: 16px;" value="0" min="0" required>
                        </div>
                    </div>

                    <!-- Papan Visual Mesin PWA Realtime DOM Math -->
                    <div class="mb-5 p-4 rounded-4 shadow-lg text-white d-flex justify-content-between align-items-center" style="background: linear-gradient(135deg, var(--terracotta), #da9c88);">
                        <div>
                            <span class="d-block small fw-bold opacity-75 letter-spacing-1">GRAND TOTAL MENUNGGU TAGIHAN</span>
                            <span id="grandTotalDisplay" class="fs-1 fw-bold font-monospace mt-1 d-block">Rp 0</span>
                        </div>
                        <i class="bi bi-wallet2 text-white opacity-25" style="font-size: 3rem;"></i>
                    </div>

                    <div id="formError" class="rustic-error d-none mb-4 shadow-sm" style="background-color: #fbeee8;">
                        <i class="bi bi-exclamation-triangle-fill me-2 fs-5"></i> <span class="fw-bold"></span>
                    </div>

                    <button type="submit" class="btn btn-dark w-100 rounded-pill py-3 fw-bold fs-5 shadow-sm transition-all" id="btnSubmit">
                        <i class="bi bi-send-check-fill me-2"></i> Eksekusi & Cetak Tagihan
                    </button>
                    
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <script src="../add-order.js"></script>
</body>
</html>
