<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Keuangan Jastip - PWA</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body class="bg-rustic-cream pb-5 mb-5">
    
    <header class="bg-white shadow-sm sticky-top">
        <div class="container d-flex justify-content-between align-items-center py-3">
            <div class="d-flex align-items-center">
                <a href="../dashboard.html" class="btn btn-sm bg-light rounded-circle border-0 shadow-sm me-3" style="width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;">
                    <i class="bi bi-arrow-left fs-6 text-dark fw-bold"></i>
                </a>
                <div class="ms-1">
                    <h1 class="rustic-title m-0 fs-4">Laporan Cuan</h1>
                    <span class="small text-muted fw-medium global-store-name" id="storeNameText">Jastip Studio</span>
                </div>
            </div>
            <div class="dropdown">
                <button class="btn btn-outline-dark btn-sm rounded-pill px-3 dropdown-toggle shadow-sm" type="button" data-bs-toggle="dropdown">
                    <i class="bi bi-download me-1"></i> Ekspor
                </button>
                <ul class="dropdown-menu dropdown-menu-end border-0 shadow-lg rounded-4 p-2">
                    <li><a class="dropdown-item rounded-3 py-2" href="#" id="exportExcel"><i class="bi bi-file-earmark-spreadsheet-fill text-success me-2"></i>Download Excel (.xlsx)</a></li>
                    <li><a class="dropdown-item rounded-3 py-2" href="#" id="exportPDF"><i class="bi bi-file-earmark-pdf-fill text-danger me-2"></i>Download PDF (.pdf)</a></li>
                </ul>
            </div>
        </div>
    </header>

    <main class="container my-4">
        
        <!-- Tab Filter Waktu Reaktif -->
        <div class="d-flex bg-white p-1 rounded-pill shadow-sm mb-4 border border-light" style="max-width: 400px; margin: 0 auto;">
            <button class="btn btn-sm flex-fill rounded-pill fw-bold py-2 filter-btn active" data-range="day">Hari Ini</button>
            <button class="btn btn-sm flex-fill rounded-pill fw-bold py-2 filter-btn" data-range="month">Bulan Ini</button>
            <button class="btn btn-sm flex-fill rounded-pill fw-bold py-2 filter-btn" data-range="year">Tahun Ini</button>
        </div>

        <!-- 3 Summary Dashboards (Kertas Struk Gaya Rustic) -->
        <div class="row g-3 mb-4">
            <div class="col-12">
                <div class="card border-0 shadow-sm p-4 rounded-4 bg-white position-relative overflow-hidden" style="border-left: 6px solid var(--sage-green) !important;">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <span class="small fw-bold text-muted text-uppercase letter-spacing-1">Laba Bersih (Net)</span>
                            <h2 class="fw-bold text-dark mt-1 m-0" id="netProfitDisplay" style="font-family: 'Jost', sans-serif;">Rp 0</h2>
                            <p class="small text-muted m-0 mt-1 opacity-75">Hasil (Jual - Pokok) + Fee Packing</p>
                        </div>
                        <div class="bg-sage-green text-white rounded-circle d-flex align-items-center justify-content-center shadow-sm" style="width: 50px; height: 50px;">
                            <i class="bi bi-graph-up-arrow fs-4"></i>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="col-6">
                <div class="card border-0 shadow-sm p-3 h-100 rounded-4 bg-white" style="border-left: 4px solid var(--terracotta) !important;">
                    <span class="small fw-bold text-muted d-block mb-1">Laba Kotor</span>
                    <h5 class="fw-bold text-dark m-0 pb-1" id="grossProfitDisplay">Rp 0</h5>
                    <span class="x-small text-muted" style="font-size: 0.65rem;">Total Jual + Packing</span>
                </div>
            </div>
            
            <div class="col-6">
                <div class="card border-0 shadow-sm p-3 h-100 rounded-4 bg-white" style="border-left: 4px solid #f39c12 !important;">
                    <span class="small fw-bold text-muted d-block mb-1">Fee Packing</span>
                    <h5 class="fw-bold text-dark m-0 pb-1" id="totalFeeDisplay">Rp 0</h5>
                    <span class="x-small text-muted" style="font-size: 0.65rem;">Jasa Kemas & Jastip</span>
                </div>
            </div>
        </div>

        <!-- Indikator Loading Data -->
        <div id="loadingState" class="text-center py-5 d-none">
            <div class="spinner-grow text-sage-green" role="status"></div>
            <p class="mt-2 text-muted fw-medium">Menghitung Brangkas...</p>
        </div>

        <!-- Daftar Transaksi Per Periode -->
        <h6 class="fw-bold text-muted mb-3 ps-1"><i class="bi bi-journal-text me-2"></i>Rekap Transaksi Terpilih</h6>
        <div id="reportList" class="row g-3">
            <!-- Diisi oleh reports.js -->
        </div>

    </main>

    <!-- JS Libraries for Export (CDN) -->
    <!-- SheetJS (Excel) -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <!-- jsPDF & AutoTable (PDF) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <script src="../app.js"></script>
    <script src="../reports.js"></script>
</body>
</html>
