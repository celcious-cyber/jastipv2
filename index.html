<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jastip Studio</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
    <!-- PWA Manifest Link -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#c67156">
</head>
<body class="bg-rustic-cream d-flex align-items-center justify-content-center min-vh-100">

    <main class="container py-4" style="max-width: 450px;">
        <!-- Branding Header -->
        <div class="text-center mb-5">
            <!-- Circle Aesthetic Logo -->
            <div class="logo-circle mx-auto d-flex align-items-center justify-content-center text-white shadow-sm mb-3" 
                 style="width: 85px; height: 85px; border-radius: 50%; background-color: var(--sage-green);">
                    <img src="/jastip-icon-512.svg" alt="Jastip Logo" style="width: 48px; height: 48px;" class="img-fluid" />
            </div>
            <h1 class="rustic-title mb-1">Jastip Studio</h1>
            <p class="text-muted small fw-medium" style="letter-spacing: 0.5px;">Your Personal Shopping Assistant</p>
        </div>

        <!-- Login Card -->
        <div class="card rustic-card mb-4" style="border-radius: 24px;">
            <div class="card-body p-4 p-md-5">
                <!-- 1. LOGIN FORM -->
                <form id="loginForm">
                    <div class="input-group rustic-input-group mb-4">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" class="form-control rustic-input" id="emailInput" placeholder="Alamat Email" required>
                    </div>
                    <div class="input-group rustic-input-group mb-4">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control rustic-input" id="passwordInput" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 rounded-pill py-3 fw-bold mt-2 fs-6">Masuk Sekarang</button>
                    <div id="loginError" class="rustic-error d-none mt-4">
                        <i class="bi bi-exclamation-circle me-2"></i> <span>Kombinasi salah.</span>
                    </div>
                </form>

                <!-- 2. REGISTER FORM (Hidden by Default) -->
                <form id="registerForm" class="d-none">
                    <div class="input-group rustic-input-group mb-4">
                        <span class="input-group-text"><i class="bi bi-shop"></i></span>
                        <input type="text" class="form-control rustic-input" id="regStoreName" placeholder="Nama Toko Jastip-mu" required>
                    </div>
                    <div class="input-group rustic-input-group mb-4">
                        <span class="input-group-text"><i class="bi bi-envelope-plus"></i></span>
                        <input type="email" class="form-control rustic-input" id="regEmail" placeholder="Email Kerjamu" required>
                    </div>
                    <div class="input-group rustic-input-group mb-4">
                        <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                        <input type="password" class="form-control rustic-input" id="regPassword" placeholder="Buat Password" required>
                    </div>
                    <button type="submit" class="btn btn-dark w-100 rounded-pill py-3 fw-bold mt-2 fs-6 shadow-sm">Buat Akun Jastip</button>
                    <div id="registerError" class="rustic-error d-none mt-4 text-danger">
                        <i class="bi bi-exclamation-circle me-2"></i> <span>Gagal mendaftar.</span>
                    </div>
                </form>
            </div>
        </div>

        <!-- Bottom Nav Toggle -->
        <div class="text-center">
            <p class="small text-muted" id="authToggleText">
                Belum punya akun? <br>
                <a href="javascript:void(0)" onclick="toggleAuth(true)" class="rustic-link fw-bold text-decoration-none mt-1 d-inline-block">Daftar Akun Baru</a>
            </p>
            <p class="small text-muted d-none" id="authLoginText">
                Sudah punya akun? <br>
                <a href="javascript:void(0)" onclick="toggleAuth(false)" class="rustic-link fw-bold text-decoration-none mt-1 d-inline-block">Masuk ke Dashboard</a>
            </p>
        </div>
    </main>

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <!-- Use auth.js to handle login logic -->
    <script src="auth.js"></script>
    
    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('PWA Service Worker Terdaftar!', reg))
            .catch((err) => console.log('Gagal Daftar Service Worker', err));
        });
      }
    </script>
</body>
</html>
